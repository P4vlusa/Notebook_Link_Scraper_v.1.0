name: Crawl All Dealers (Manual Only)

on:
  workflow_dispatch:

jobs:
  xgear:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run XGEAR crawler
        run: python xgear.py

      - name: Commit XGEAR
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git fetch origin main
          git reset --soft origin/main
          git add output/xgear.csv
          git commit -m "Update XGEAR" || echo "No changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main

  gearvn:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          pip install selenium webdriver-manager beautifulsoup4 pandas
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run GearVN crawler
        run: python gearvn.py

      - name: Commit GearVN
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git fetch origin main
          git reset --soft origin/main
          git add output/gearvn.csv
          git commit -m "Update GearVN" || echo "No changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main

  # … lặp lại tương tự cho các job khác (laptopworld, phongvu, fpt, cellphones,
