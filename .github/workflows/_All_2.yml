name: ALL Laptop Crawler

on:
  # Chạy tự động mỗi sáng thứ 5 lúc 02:00 UTC (09:00 giờ Việt Nam)
  schedule:
    - cron: '0 2 * * 4'

  # Cho phép chạy thủ công từ GitHub Actions tab
  workflow_dispatch:
    inputs:
      sites:
        description: 'Sites to crawl (space-separated, leave empty for all)'
        required: false
        default: ''
      delay:
        description: 'Delay between requests (seconds)'
        required: false
        default: '1.5'

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # Tối đa 3 giờ

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml playwright

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Run AnKhang crawler
        run: python ankhang.py
      
      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git fetch origin main
          git reset --soft origin/main

          git add output/ankhang.csv
          git commit -m "Update AnKhang" || echo "No changes"

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main


